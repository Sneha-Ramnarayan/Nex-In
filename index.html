<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover"/>
<title>Nex-In</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#2D2926"/>
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png?v=34"/>
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png?v=34"/>
<link rel="shortcut icon" type="image/png" href="favicon-32.png?v=34"/>
<link rel="apple-touch-icon" href="icon-192.png?v=34"/>

<!-- iOS standalone app behavior -->
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Nex-In"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #F7F4F0;
  --surface:   #FFFFFF;
  --surface2:  rgba(255,255,255,0.82);
  --border:    rgba(180,170,160,0.22);
  --shadow-sm: 0 2px 8px rgba(100,90,80,0.08);
  --shadow-md: 0 8px 28px rgba(100,90,80,0.12);
  --shadow-lg: 0 20px 56px rgba(100,90,80,0.16);
  --text:      #1C1917;
  --text2:     #78716C;
  --text3:     #A8A29E;
  --accent:    #2D2926;
  --accent2:   #6B5E52;
  --gold:      #C9A96E;
  --gold2:     #E8D5B0;
  --danger:    #C0392B;
  --r-sm:      12px;
  --r-md:      18px;
  --r-lg:      24px;
  --r-xl:      32px;
  --tab-h:     80px;
  --header-h:  68px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; }
body {
  font-family: 'DM Sans', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overscroll-behavior-y: contain;
  padding-bottom: calc(var(--tab-h) + env(safe-area-inset-bottom, 0px) + 20px);
  -webkit-font-smoothing: antialiased;
}
button, input, select, textarea { font: inherit; color: inherit; background: none; border: none; outline: none; cursor: pointer; }
a { color: inherit; text-decoration: none; }
img { display: block; max-width: 100%; }
.hidden { display: none !important; }

/* ── Utility ── */
.surface  { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-lg); box-shadow: var(--shadow-sm); }
.surface2 { background: var(--surface2); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.7); border-radius: var(--r-lg); box-shadow: var(--shadow-md); }
.flex     { display: flex; }
.flex-col { display: flex; flex-direction: column; }
.items-center { align-items: center; }
.justify-between { justify-content: space-between; }
.gap-2  { gap: 8px; }
.gap-3  { gap: 12px; }
.gap-4  { gap: 16px; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.w-full { width: 100%; }
.wrap   { flex-wrap: wrap; }

/* ── Typography ── */
.serif   { font-family: 'DM Serif Display', Georgia, serif; }
.t-xs    { font-size: 11px; line-height: 1.5; }
.t-sm    { font-size: 13px; line-height: 1.5; }
.t-base  { font-size: 15px; line-height: 1.5; }
.t-lg    { font-size: 18px; line-height: 1.3; }
.t-xl    { font-size: 22px; line-height: 1.2; }
.t-2xl   { font-size: 28px; line-height: 1.1; }
.t-3xl   { font-size: 36px; line-height: 1.05; }
.fw-4    { font-weight: 400; }
.fw-5    { font-weight: 500; }
.fw-6    { font-weight: 600; }
.fw-7    { font-weight: 700; }
.fw-8    { font-weight: 800; }
.c-muted { color: var(--text2); }
.c-faint { color: var(--text3); }
.c-gold  { color: var(--gold); }
.c-accent{ color: var(--accent); }
.text-center { text-align: center; }

/* ── Inputs ── */
.field {
  width: 100%; padding: 15px 16px;
  border-radius: var(--r-md);
  border: 1.5px solid var(--border);
  background: var(--surface);
  font-size: 16px; /* prevents iOS zoom */
  transition: border-color .15s, box-shadow .15s;
}
.field:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(201,169,110,0.15); }
.field-label { font-size: 12px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--text2); margin-bottom: 7px; display: block; }

/* ── Buttons ── */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  padding: 15px 20px; border-radius: var(--r-md);
  font-size: 15px; font-weight: 700; letter-spacing: .01em;
  transition: transform .12s, box-shadow .12s, filter .12s;
  white-space: nowrap;
}
.btn:active { transform: scale(.97); }
.btn-dark {
  background: var(--accent); color: #fff;
  box-shadow: 0 8px 24px rgba(29,23,19,0.28);
}
.btn-dark:active { box-shadow: 0 4px 12px rgba(29,23,19,0.2); }
.btn-gold {
  background: linear-gradient(135deg, var(--gold), #b8914f);
  color: #fff;
  box-shadow: 0 8px 24px rgba(201,169,110,0.35);
}
.btn-ghost {
  background: var(--surface); color: var(--text);
  border: 1.5px solid var(--border);
  box-shadow: var(--shadow-sm);
}
.btn-ghost:active { background: var(--bg); }
.btn-danger { background: #FEF2F2; color: var(--danger); border: 1.5px solid rgba(192,57,43,0.2); }
.btn-sm { padding: 10px 14px; font-size: 13px; border-radius: var(--r-sm); }
.btn-xs { padding: 7px 12px; font-size: 12px; font-weight: 700; border-radius: 10px; }
.btn-icon {
  width: 42px; height: 42px;
  border-radius: 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  display: grid; place-items: center;
  box-shadow: var(--shadow-sm);
}
.btn-icon svg { width: 20px; height: 20px; stroke: var(--text2); }

/* ── Chips / Pills ── */
.chip {
  padding: 9px 15px; border-radius: 999px;
  font-size: 13px; font-weight: 600;
  border: 1.5px solid var(--border);
  background: var(--surface);
  color: var(--text2);
  transition: all .15s;
}
.chip:active { transform: scale(.97); }
.chip.on {
  background: var(--accent); color: #fff;
  border-color: transparent;
  box-shadow: 0 4px 14px rgba(29,23,19,0.2);
}
.badge {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 5px 10px; border-radius: 999px;
  font-size: 11px; font-weight: 700; letter-spacing: .04em;
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text2);
}
.badge-gold { background: rgba(201,169,110,.12); border-color: rgba(201,169,110,.3); color: #8B6914; }

/* ── Header ── */
.header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  height: var(--header-h);
  background: rgba(247,244,240,0.92);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 20px;
}
.brand-logo {
  height: 42px; width: auto; display: block;
  filter: drop-shadow(0 1px 2px rgba(45,41,38,0.12));
}
.brand-logo-wrap {
  position: relative; display: inline-block; overflow: hidden;
}
.brand-logo-wrap::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(115deg, transparent 35%, rgba(201,169,110,0.55) 50%, transparent 65%);
  background-size: 250% 100%;
  mix-blend-mode: overlay;
  animation: sheen 3.2s ease-in-out infinite;
  pointer-events: none;
}
@keyframes sheen { 0%,100% { background-position: 160% 0; } 50% { background-position: -60% 0; } }

/* ── Tab bar ── */
.tabbar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  height: calc(var(--tab-h) + env(safe-area-inset-bottom, 0px));
  background: rgba(247,244,240,0.96);
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  border-top: 1px solid var(--border);
  display: grid; grid-template-columns: repeat(5,1fr);
  padding-bottom: env(safe-area-inset-bottom, 0px);
}
.tab-item {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 4px; padding: 0 4px;
  font-size: 10px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase;
  color: var(--text3); transition: color .15s;
}
.tab-item.active { color: var(--accent); }
.tab-item svg { width: 22px; height: 22px; }
.tab-dot {
  width: 4px; height: 4px; border-radius: 999px;
  background: var(--gold); margin-top: -2px;
  transition: opacity .15s;
}

/* ── Main content ── */
main { padding-top: calc(var(--header-h) + 16px); padding-left: 16px; padding-right: 16px; }
.page-gap { display: flex; flex-direction: column; gap: 14px; padding-bottom: 16px; }

/* ── Product grid ── */
.prod-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.prod-card { border-radius: var(--r-lg); overflow: hidden; background: var(--surface); border: 1px solid var(--border); box-shadow: var(--shadow-sm); transition: transform .15s; }
.prod-card:active { transform: scale(.98); }
.prod-card-img { width: 100%; aspect-ratio: 3/4; object-fit: cover; background: #F0EBE5; }
.prod-card-body { padding: 12px; }
.prod-card-brand { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--text3); margin-bottom: 3px; }
.prod-card-name { font-size: 13px; font-weight: 600; line-height: 1.35; margin-bottom: 8px; color: var(--text); }
.prod-card-price { font-size: 15px; font-weight: 800; color: var(--accent); }
.prod-card-off  { font-size: 11px; font-weight: 600; color: var(--gold); margin-left: 4px; }

/* ── Section header ── */
.section-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 12px; }
.section-title { font-size: 18px; font-weight: 700; color: var(--text); }

/* ── Hero banner ── */
.hero-banner {
  border-radius: var(--r-xl);
  background: linear-gradient(145deg, var(--accent) 0%, #3D332C 60%, var(--accent2) 100%);
  color: #fff; padding: 24px 20px; position: relative; overflow: hidden;
}
.hero-banner::before {
  content: ''; position: absolute; top: -40px; right: -40px;
  width: 180px; height: 180px; border-radius: 50%;
  background: rgba(201,169,110,0.12);
}
.hero-banner::after {
  content: ''; position: absolute; bottom: -60px; left: -20px;
  width: 220px; height: 220px; border-radius: 50%;
  background: rgba(201,169,110,0.07);
}

/* ── KPI row ── */
.kpi-strip { display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; }
.kpi-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-md); padding: 14px; box-shadow: var(--shadow-sm); }
.kpi-num { font-size: 20px; font-weight: 800; color: var(--text); }
.kpi-lab { font-size: 11px; color: var(--text3); margin-top: 3px; font-weight: 600; }

/* ── Price row ── */
.price-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 16px; border-radius: var(--r-md);
  background: var(--bg); border: 1px solid var(--border);
}
.price-row-best {
  background: rgba(201,169,110,0.08); border-color: rgba(201,169,110,0.3);
}

/* ── Size pills ── */
.size-grid { display: flex; flex-wrap: wrap; gap: 8px; }
.size-pill {
  padding: 9px 14px; border-radius: 999px;
  font-size: 13px; font-weight: 700;
  border: 1.5px solid var(--border); background: var(--surface);
  color: var(--text2);
}
.size-pill.rec {
  background: var(--accent); color: #fff; border-color: transparent;
  box-shadow: 0 4px 12px rgba(29,23,19,0.2);
}

/* ── Search bar ── */
.search-wrap { position: relative; }
.search-wrap svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); width: 18px; height: 18px; stroke: var(--text3); pointer-events: none; }
.search-field { width: 100%; padding: 13px 16px 13px 42px; border-radius: var(--r-md); border: 1.5px solid var(--border); background: var(--surface); font-size: 15px; box-shadow: var(--shadow-sm); transition: border-color .15s; }
.search-field:focus { border-color: var(--gold); }

/* ── Notify panel ── */
.notify-panel {
  position: absolute; top: 52px; right: 0;
  width: min(360px, calc(100vw - 32px));
  max-height: 72vh; overflow-y: auto;
  z-index: 200;
  border-radius: var(--r-lg);
  background: var(--surface);
  border: 1px solid var(--border);
  box-shadow: var(--shadow-lg);
  padding: 8px;
}
.notify-item { padding: 12px 14px; border-radius: var(--r-md); }
.notify-item + .notify-item { border-top: 1px solid var(--border); }
.notify-title { font-size: 13px; font-weight: 700; margin-bottom: 3px; }
.notify-body  { font-size: 12px; color: var(--text2); line-height: 1.5; }

/* ── Auth page ── */
.auth-page { min-height: 100vh; display: flex; flex-direction: column; padding: 0 24px 48px; padding-top: env(safe-area-inset-top, 0px); }
.auth-logo-area { padding-top: 56px; padding-bottom: 32px; text-align: center; }
.auth-logo-img { height: 56px; width: auto; margin: 0 auto; display: block; filter: drop-shadow(0 4px 16px rgba(45,41,38,0.18)); }
.auth-subtitle { font-size: 16px; color: var(--text2); margin-top: 6px; font-weight: 400; }
.auth-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-xl); box-shadow: var(--shadow-lg); padding: 28px 24px 32px; }
.auth-tabs { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; background: var(--bg); border-radius: 14px; padding: 5px; margin-bottom: 24px; }
.auth-tab { padding: 11px; border-radius: 11px; font-size: 14px; font-weight: 700; color: var(--text2); text-align: center; transition: all .15s; }
.auth-tab.active { background: var(--surface); color: var(--accent); box-shadow: var(--shadow-sm); }
.form-stack { display: flex; flex-direction: column; gap: 16px; }
.error-box { background: #FEF2F2; border: 1px solid rgba(192,57,43,0.2); border-radius: var(--r-md); padding: 12px 14px; font-size: 13px; color: var(--danger); }
.auth-features { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-top: 20px; }
.auth-feat { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-md); padding: 14px 10px; text-align: center; box-shadow: var(--shadow-sm); }
.auth-feat-icon { font-size: 22px; line-height: 1; margin-bottom: 8px; }
.auth-feat-label { font-size: 11px; font-weight: 700; color: var(--text2); }

/* ── Onboarding ── */
.onboard-overlay { position: fixed; inset: 0; z-index: 300; background: var(--bg); overflow-y: auto; padding: 0 20px 40px; }
.progress-bar { height: 3px; background: var(--border); border-radius: 999px; overflow: hidden; margin-bottom: 24px; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--gold), var(--accent2)); border-radius: 999px; transition: width .3s ease; }
.hint-box { background: rgba(201,169,110,.1); border: 1px solid rgba(201,169,110,.25); border-radius: var(--r-md); padding: 12px 14px; font-size: 13px; color: #7A5B20; line-height: 1.5; }

/* ── Profile ── */
.profile-info-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-lg); overflow: hidden; box-shadow: var(--shadow-sm); }
.profile-row { display: flex; justify-content: space-between; align-items: center; padding: 15px 18px; border-bottom: 1px solid var(--border); }
.profile-row:last-of-type { border-bottom: none; }
.profile-row-label { font-size: 13px; color: var(--text2); }
.profile-row-value { font-size: 13px; font-weight: 600; text-align: right; max-width: 60%; word-break: break-all; }
.profile-avatar { width: 56px; height: 56px; border-radius: 999px; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 20px; font-weight: 800; flex-shrink: 0; }
.edit-link { display: flex; align-items: center; gap: 6px; padding: 14px 18px; font-size: 13px; font-weight: 700; color: var(--gold); border-top: 1px solid var(--border); cursor: pointer; }

/* ── Tracker / Wardrobe item ── */
.item-row { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-lg); padding: 14px; box-shadow: var(--shadow-sm); display: flex; gap: 12px; align-items: center; }
.item-thumb { width: 68px; height: 68px; border-radius: var(--r-md); object-fit: cover; background: #F0EBE5; flex-shrink: 0; }
.item-info { flex: 1; min-width: 0; }
.item-brand { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--text3); }
.item-name  { font-size: 14px; font-weight: 700; line-height: 1.3; margin: 2px 0 4px; }
.item-price { font-size: 13px; font-weight: 600; color: var(--gold); }

/* ── Empty state ── */
.empty-state { padding: 48px 24px; text-align: center; }
.empty-icon { font-size: 40px; margin-bottom: 14px; }
.empty-title { font-size: 17px; font-weight: 700; margin-bottom: 6px; }
.empty-sub   { font-size: 13px; color: var(--text2); line-height: 1.6; }

/* ── Premium card ── */
.premium-card { background: linear-gradient(145deg, var(--accent) 0%, #3D332C 100%); border-radius: var(--r-lg); padding: 20px; color: #fff; }
.premium-feature { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); border-radius: var(--r-md); padding: 14px; }
.premium-feature-title { font-size: 13px; font-weight: 700; color: #fff; margin-bottom: 4px; }
.premium-feature-desc  { font-size: 12px; color: rgba(255,255,255,.6); line-height: 1.5; }

/* ── Separator ── */
.sep { border: none; border-top: 1px solid var(--border); }

/* ── Toast ── */
#toast {
  position: fixed; bottom: calc(var(--tab-h) + env(safe-area-inset-bottom,0px) + 16px); left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--accent); color: #fff;
  padding: 12px 22px; border-radius: 999px;
  font-size: 13px; font-weight: 700;
  box-shadow: 0 8px 24px rgba(0,0,0,0.2);
  opacity: 0; transition: opacity .2s, transform .2s;
  pointer-events: none; white-space: nowrap; z-index: 500;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── Install banner ── */
#install-banner {
  display: none;
  position: fixed; left: 14px; right: 14px;
  bottom: calc(var(--tab-h) + env(safe-area-inset-bottom,0px) + 12px);
  z-index: 400;
  background: var(--accent); color: #fff;
  border-radius: var(--r-lg);
  padding: 14px 14px 14px 16px;
  align-items: center; gap: 12px;
  box-shadow: 0 12px 32px rgba(0,0,0,0.25);
  animation: slideUp .3s ease forwards;
}
@keyframes slideUp { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }
#install-banner .ib-icon { width:38px;height:38px;border-radius:11px;flex-shrink:0; }
#install-banner .ib-text { flex:1; min-width:0; }
#install-banner .ib-title { font-size:13px; font-weight:700; }
#install-banner .ib-sub { font-size:11px; color:rgba(255,255,255,.6); margin-top:1px; }
#install-banner button.ib-install { background:var(--gold); color:#fff; font-size:12px; font-weight:700; padding:9px 14px; border-radius:10px; flex-shrink:0; cursor:pointer; border:none; }
#install-banner button.ib-close { width:28px;height:28px;border-radius:999px;background:rgba(255,255,255,.12);color:#fff;font-size:16px;flex-shrink:0;display:grid;place-items:center;cursor:pointer;border:none; }
</style>
</head>
<body>
<div id="app"></div>
<div id="toast"></div>
<div id="install-banner" style="display:none">
  <img class="ib-icon" src="icon-192.png" alt="Nex-In"/>
  <div class="ib-text">
    <div class="ib-title">Install Nex-In</div>
    <div class="ib-sub" id="ib-sub">Add to home screen for the full app experience</div>
  </div>
  <button id="ib-install-btn" class="ib-install">Install</button>
  <button id="ib-close-btn" class="ib-close">&#x2715;</button>
</div>
<script>
(function(){
'use strict';

/* ─── Storage keys ─── */
const K = {
  accounts: 'ni_accounts',
  session:  'ni_session',
  pfx_profile:   'ni_pf_',
  pfx_tracker:   'ni_tr_',
  pfx_wardrobe:  'ni_wd_',
  pfx_onboarded: 'ni_ob_',
  pfx_premium:   'ni_pr_'
};

function lsGet(key, fb){ try{ const v=localStorage.getItem(key); return v!==null ? JSON.parse(v) : fb; }catch(e){ return fb; } }
function lsSet(key, val){ try{ localStorage.setItem(key, JSON.stringify(val)); }catch(e){} }
function lsDel(key){ try{ localStorage.removeItem(key); }catch(e){} }

/* ─── Currency config ─── */
const CURRENCY = {
  IN:{ sym:'₹',  code:'INR', locale:'en-IN' },
  US:{ sym:'$',  code:'USD', locale:'en-US' },
  GB:{ sym:'£',  code:'GBP', locale:'en-GB' },

function fmtMoney(n, country){
  const c = CURRENCY[country] || CURRENCY.IN;
  const num = Number(n);
  if(c.code==='INR') return '₹'+num.toLocaleString('en-IN');
  return c.sym + num.toLocaleString('en-US');
}

/* ─── Auth helpers ─── */
function doSignup(name, email, password){
  if(!email||!password) return 'Please fill in all fields.';
  const e=email.trim().toLowerCase();
  if(!/\S+@\S+\.\S+/.test(e)) return 'Enter a valid email address.';
  if(password.length<6) return 'Password must be at least 6 characters.';
  if(accounts[e]) return 'An account with this email already exists.';
  accounts[e] = { name: name.trim()||'User', password };
  lsSet(K.accounts, accounts);
  lsSet(K.pfx_profile+e, dfProfile());
  currentUser = e;
  lsSet(K.session, {email:e});
  loadUser(e);
  return null;
}
function doSignin(email, password){
  if(!email||!password) return 'Please fill in all fields.';
  const e=email.trim().toLowerCase();
  const acc=accounts[e];
  if(!acc||acc.password!==password) return 'Incorrect email or password.';
  currentUser = e;
  lsSet(K.session, {email:e});
  loadUser(e);
  return null;
}
function isOnboarded(){ return currentUser && lsGet(K.pfx_onboarded+currentUser, false); }

/* ─── Size recommendation ─── */
function recSize(p){
  if(p.type==='shoe') return profile.shoe||'Add shoe size';
  if(p.type==='accessory') return 'One Size';
  const ch=parseFloat(profile.chest), wa=parseFloat(profile.waist), hi=parseFloat(profile.hip);
  function fromBust(v){ if(!isFinite(v)) return null; if(v<=32) return 'XS'; if(v<=35) return 'S'; if(v<=38) return 'M'; if(v<=41) return 'L'; return 'XL'; }
  function fromWaist(v){ if(!isFinite(v)) return null; if(v<=26) return 'XS'; if(v<=29) return 'S'; if(v<=32) return 'M'; if(v<=35) return 'L'; return 'XL'; }
  function fromHip(v){ if(!isFinite(v)) return null; if(v<=36) return 'XS'; if(v<=39) return 'S'; if(v<=42) return 'M'; if(v<=45) return 'L'; return 'XL'; }
  function larger(a,b){ const o=['XS','S','M','L','XL']; const ra=o.indexOf(a),rb=o.indexOf(b); if(ra<0) return b; if(rb<0) return a; return ra>=rb?a:b; }
  if(p.type==='bottom'){ const w=fromWaist(wa),h=fromHip(hi); return larger(w,h)||'Add measurements'; }
  if(p.type==='top'||p.type==='dress'){ return fromBust(ch)||'Add measurements'; }
  return 'One Size';
}

/* ─── Prices for current country ─── */
function pricesFor(p){ return p.prices||[]; }
function minPrice(p){ const ps=pricesFor(p); return ps.length?Math.min(...ps.map(x=>x.p)):0; }
function maxDisc(p){ const ps=pricesFor(p); return ps.length?Math.max(...ps.map(x=>Math.round((1-x.p/x.o)*100))):0; }
function bestPlatform(p){ const ps=pricesFor(p); return ps.length?ps.reduce((a,b)=>a.p<b.p?a:b):{pl:'—',p:0,o:0}; }

/* ─── Helpers ─── */
function esc(s){ return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function $(sel,ctx=document){ return (ctx).querySelector(sel); }
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2200); }
function getInitials(name){ return name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2); }

/* ─── Event listener hub ─── */
function attachListeners(){
  /* Auth */
  const btnAuth=$('#btn-auth');
  if(btnAuth) btnAuth.addEventListener('click',()=>{
    const email=($('#f-email')||{}).value||'';
    const pass=($('#f-pass')||{}).value||'';
    const name=($('#f-name')||{}).value||'';
    S.authError='';
    const err=S.authMode==='signin'?doSignin(email,pass):doSignup(name,email,pass);
    if(err){ S.authError=err; render(); return; }
    S.view=isOnboarded()?'app':'onboard';
    S.tab='discover';
    render();
  });
  const tabSI=$('#tab-signin');
  if(tabSI) tabSI.addEventListener('click',()=>{ S.authMode='signin'; S.authError=''; render(); });
  const tabSU=$('#tab-signup');
  if(tabSU) tabSU.addEventListener('click',()=>{ S.authMode='signup'; S.authError=''; render(); });
  const swMode=$('#sw-mode');
  if(swMode) swMode.addEventListener('click',()=>{ S.authMode=S.authMode==='signin'?'signup':'signin'; S.authError=''; render(); });
  /* allow Enter key on auth fields */
  ['#f-email','#f-pass','#f-name'].forEach(sel=>{
    const el=$(sel);
    if(el) el.addEventListener('keydown',e=>{ if(e.key==='Enter'){ e.preventDefault(); btnAuth&&btnAuth.click(); } });
  });

  /* Onboarding */
  const obNext=$('#ob-next');
  if(obNext) obNext.addEventListener('click',()=>{
    profile.chest=$('#ob-chest')?.value||'';
    profile.waist=$('#ob-waist')?.value||'';
    profile.hip=$('#ob-hip')?.value||'';
    profile.height=$('#ob-height')?.value||'';
    profile.shoe=$('#ob-shoe')?.value||'';
    saveUser();
    S.obStep=2; render();
  });
  const obSkip=$('#ob-skip');
  if(obSkip) obSkip.addEventListener('click',()=>{ lsSet(K.pfx_onboarded+currentUser,true); S.view='app'; render(); });
  const obBack=$('#ob-back');
  if(obBack) obBack.addEventListener('click',()=>{ S.obStep=1; render(); });
  const obFinish=$('#ob-finish');
  if(obFinish) obFinish.addEventListener('click',()=>{
    profile.country=$('#ob-country')?.value||'IN';
    saveUser(); lsSet(K.pfx_onboarded+currentUser,true);
    S.view='app'; S.tab='discover'; render();
  });
  const obCur=$('#ob-country');
  if(obCur) obCur.addEventListener('change',()=>{
    const pr=$('#ob-cur-preview');
    const c=CURRENCY[obCur.value]||CURRENCY.IN;
    if(pr) pr.textContent=`Prices will show in ${c.sym} ${c.code}.`;
  });

  /* Nav tabs */
  document.querySelectorAll('[data-tab]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const t=btn.dataset.tab;
      S.tab=t; S.view='app'; S.showNotify=false;
      // switching away from search clears the query so it doesn't bleed into Discover
      if(t!=='search' && t!=='discover') S.query='';
      render();
    });
  });

  /* Notifications */
  const notBtn=$('#notify-btn');
  if(notBtn) notBtn.addEventListener('click',e=>{ e.stopPropagation(); S.showNotify=!S.showNotify; render(); });
  const notClose=$('#notify-close');
  if(notClose) notClose.addEventListener('click',()=>{ S.showNotify=false; render(); });

  /* Search */
  const si=$('#search-input');
  if(si) si.addEventListener('input',()=>{
    S.query=si.value;
    if(S.tab==='search'){ buildSearch(); attachSearchListeners(); }
    else { buildDiscover(); attachSearchListeners(); }
  });

  /* Category chips */
  document.querySelectorAll('[data-cat]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      S.cat=btn.dataset.cat; S.tab='discover';
      buildDiscover(); attachSearchListeners();
    });
  });

  /* Product cards (discover) */
  document.querySelectorAll('.prod-card[data-pid]').forEach(card=>{
    card.addEventListener('click',()=>{ S.productId=parseInt(card.dataset.pid); S.view='product'; render(); });
  });

  /* Product cards (tracker/wardrobe lists) */
  document.querySelectorAll('.item-row[data-pid]').forEach(row=>{
    row.addEventListener('click',()=>{ S.productId=parseInt(row.dataset.pid); S.view='product'; render(); });
  });

  /* Back button on product */
  const btnBack=$('#btn-back');
  if(btnBack) btnBack.addEventListener('click',()=>{ S.view='app'; S.productId=null; render(); });

  /* Track / purchase on product detail */
  const btnTrack=$('#btn-track');
  if(btnTrack) btnTrack.addEventListener('click',()=>{
    if(!tracker.includes(S.productId)){ tracker.unshift(S.productId); saveUser(); toast('Added to Tracker'); }
    else toast('Already in Tracker');
    render();
  });
  const btnPurchase=$('#btn-purchase');
  if(btnPurchase) btnPurchase.addEventListener('click',()=>{
    if(!wardrobe.includes(S.productId)){ wardrobe.unshift(S.productId); saveUser(); toast('Added to Wardrobe ✓'); }
    else toast('Already in Wardrobe');
    render();
  });
  const btnPremiumToggle=$('#btn-premium-toggle');
  if(btnPremiumToggle) btnPremiumToggle.addEventListener('click',()=>{ premium=!premium; saveUser(); render(); });

  /* Discover premium btn */
  const btnPremium=$('#btn-premium');
  if(btnPremium) btnPremium.addEventListener('click',()=>{ premium=!premium; saveUser(); render(); });

  /* Profile */
  const btnEditProfile=$('#btn-edit-profile');
  if(btnEditProfile) btnEditProfile.addEventListener('click',()=>{ S.showEditProfile=!S.showEditProfile; render(); });
  const btnSaveInfo=$('#btn-save-info');
  if(btnSaveInfo) btnSaveInfo.addEventListener('click',()=>{
    const n=$('#pf-name')?.value.trim();
    if(n){ accounts[currentUser].name=n; lsSet(K.accounts,accounts); }
    profile.mobile=$('#pf-mobile')?.value.trim()||'';
    saveUser(); S.showEditProfile=false; toast('Profile updated'); render();
  });
  const btnCancelEdit=$('#btn-cancel-edit');
  if(btnCancelEdit) btnCancelEdit.addEventListener('click',()=>{ S.showEditProfile=false; render(); });
  const btnSaveProfile=$('#btn-save-profile');
  if(btnSaveProfile) btnSaveProfile.addEventListener('click',()=>{
    const prevCountry = profile.country;
    profile.country=$('#pf-country')?.value||profile.country;
    profile.chest=$('#pf-chest')?.value||'';
    profile.waist=$('#pf-waist')?.value||'';
    profile.hip=$('#pf-hip')?.value||'';
    profile.height=$('#pf-height')?.value||'';
    profile.shoe=$('#pf-shoe')?.value||'';
    // Reset category filter if country changed so stale categories don't show
    if(profile.country !== prevCountry) S.cat = 'All';
    saveUser(); toast('Changes saved ✓'); render();
  });
  const btnSignout=$('#btn-signout');
  if(btnSignout) btnSignout.addEventListener('click',()=>{
    currentUser=null; lsDel(K.session); profile=dfProfile(); tracker=[]; wardrobe=[]; premium=false;
    S=Object.assign({view:'auth',tab:'discover',authMode:'signin',authError:'',obStep:1,cat:'All',query:'',productId:null,showNotify:false,showEditProfile:false});
    render();
  });

  /* Dismiss notify on outside click */
  if(S.showNotify){
    setTimeout(()=>{
      document.addEventListener('click',function handler(e){
        if(!e.target.closest('#notify-btn')&&!e.target.closest('.notify-panel')){
          S.showNotify=false; render();
          document.removeEventListener('click',handler);
        }
      });
    },0);
  }
}

/* ─── Install banner ─── */
(function(){
  var KEY     = 'ni_ib';
  var banner  = document.getElementById('install-banner');
  var closeBtn= document.getElementById('ib-close-btn');
  var instBtn = document.getElementById('ib-install-btn');
  var deferred= null;

  function hide(){
    if(!banner) return;
    banner.style.display = 'none';
    try{ localStorage.setItem(KEY,'1'); }catch(e){}
  }

  function isDone(){
    try{ return localStorage.getItem(KEY)==='1'; }catch(e){ return false; }
  }

  function isAlone(){
    return window.matchMedia('(display-mode: standalone)').matches
        || window.navigator.standalone === true;
  }

  /* Wire buttons via onclick — simplest and most reliable cross-browser */
  if(closeBtn) closeBtn.onclick = function(){ hide(); };
  if(instBtn)  instBtn.onclick  = function(){
    if(deferred){ deferred.prompt(); deferred=null; }
    hide();
  };

  /* Android/Chrome native install prompt */
  window.addEventListener('beforeinstallprompt', function(e){
    e.preventDefault();
    deferred = e;
    if(isDone() || isAlone()) return;
    setTimeout(function(){ if(banner) banner.style.display='flex'; }, 1200);
  });

  /* iOS Safari — no beforeinstallprompt, show instructions instead */
  var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
  if(isIOS && !isAlone() && !isDone()){
    var sub = banner ? banner.querySelector('.ib-sub') : null;
    if(sub) sub.textContent = 'Tap the Share icon \u2197, then \u201cAdd to Home Screen\u201d';
    if(instBtn) instBtn.textContent = 'Got it';
    setTimeout(function(){ if(banner) banner.style.display='flex'; }, 1200);
  }
})();

  var closeBtn= document.getElementById('ib-close-btn');
  var instBtn = document.getElementById('ib-install-btn');
  var deferred= null;

  /* Dismiss: hide immediately + persist */
  function dismiss() {
    banner.style.display = 'none';
    try { localStorage.setItem(KEY, '1'); } catch(e) {}
  }

  /* Show: only if not already dismissed or installed */
  function tryShow() {
    try { if (localStorage.getItem(KEY) === '1') return; } catch(e) {}
    if (window.matchMedia('(display-mode: standalone)').matches) return;
    if (window.navigator.standalone === true) return;
    banner.style.display = 'flex';
  }

  /* Wire buttons — direct assignment, nothing can override */
  closeBtn.onclick = dismiss;
  instBtn.onclick  = function() {
    if (deferred) { deferred.prompt(); deferred = null; }
    dismiss();
  };

  /* Android/Chrome */
  window.addEventListener('beforeinstallprompt', function(e) {
    e.preventDefault();
    deferred = e;
    setTimeout(tryShow, 1500);
  });

  /* iOS Safari */
  if (/iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream) {
    if (sub) sub.textContent = 'Tap Share ↗ then “Add to Home Screen”';
    if (instBtn) instBtn.textContent = 'Got it';
    setTimeout(tryShow, 1500);
  }
})();
</script>
</body>
</html>
